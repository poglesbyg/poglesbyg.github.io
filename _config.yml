# theme: jekyll-theme-minimal
title: Paul Greenwood - Data Scientist & AI Product Manager
description: Data Scientist and AI Product Manager with 5+ years at UNC Chapel Hill School of Medicine. MPS in Bioinformatics & Health Informatics. Expert in AI, Machine Learning, and Large Language Models for healthcare innovation and clinical research.
baseurl: ""
url: "https://poglesbyg.github.io"

# Author information
author:
  name: Paul Greenwood
  email: pogrant@alumni.unc.edu
  twitter: poglesbyg
  github: poglesbyg
  linkedin: poglesbyg

# SEO and Social Media
tagline: "Data Scientist & AI Product Manager"
keywords: "Data Scientist, AI Product Manager, Healthcare Technology, Machine Learning, Large Language Models, LLMs, Clinical AI, Health Informatics, Bioinformatics, UNC Chapel Hill, USDA Forest Service"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO Plugin settings
social:
  name: Paul Greenwood
  links:
    - https://github.com/poglesbyg
    - https://linkedin.com/in/poglesbyg

# Defaults
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      permalink: /blog/:year/:month/:day/:title/
      author: Paul Greenwood
  - scope:
      path: ""
    values:
      layout: "default"

# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:name/

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .git
  - .cursor
  - .giga
  - README.md

# Site settings
lsi: false
safe: true
source: .
incremental: false
highlighter: rouge
gist:
  noscript: false

# Kramdown settings
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Performance settings
sass:
  style: compressed

# Analytics (add your tracking IDs)
google_analytics: # Add your GA4 tracking ID
google_site_verification: # Add your Google Search Console verification code

# Contact information
contact:
  email: pogrant@alumni.unc.edu
  location: "Asheville, North Carolina, USA"
  availability: "Data Scientist/Manager at Leading Solutions, LLC | USDA Forest Service"

# Professional focus areas
expertise:
  - "Artificial Intelligence (AI)"
  - "Machine Learning"
  - "Large Language Models (LLMs)"
  - "Healthcare Innovation & Clinical Research"
  - "AI-Powered Tools & Systems Development"
  - "Clinical Decision Support & Workflow Optimization"
